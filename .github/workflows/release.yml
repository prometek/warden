name: Release

# Builds prebuilt binaries and publishes a GitHub Release whenever a `vX.Y.Z`
# tag is pushed (Architecture.md §11 "Release: binaire + checksum SHA-256").
on:
  push:
    tags:
      - "v*"

env:
  # crates/*/.sqlx caches are committed -- no live database needed to build
  # (same convention as ci.yml, issue #38).
  SQLX_OFFLINE: "true"

jobs:
  check-version:
    name: Verify tag matches Cargo.toml version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The tag is the single source of truth for the release version --
      # fail early rather than ship binaries whose --version disagrees with
      # the tag that named the release (acceptance criterion: "Binary
      # version (--version) matches the tag").
      - name: Compare tag to the 3 binary crates' Cargo.toml version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          for crate in warden warden-gated warden-tui; do
            crate_version=$(grep -m1 '^version = ' "crates/${crate}/Cargo.toml" | sed -E 's/version = "(.*)"/\1/')
            if [ "${crate_version}" != "${tag_version}" ]; then
              echo "::error::crates/${crate}/Cargo.toml version (${crate_version}) does not match tag ${GITHUB_REF_NAME} (expected ${tag_version})"
              exit 1
            fi
          done

  build:
    name: Build (${{ matrix.target }})
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # `--target` on macos-latest builds both Apple Silicon and Intel from
      # the same arm64 runner (Xcode's toolchain supports both natively) --
      # no cross toolchain from Linux, per the issue's technical notes.
      - name: Build release binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package tarball + checksum
        id: package
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          pkg_name="warden-${version}-${{ matrix.target }}"
          bin_dir="target/${{ matrix.target }}/release"
          stage_root="$(mktemp -d)"
          stage_dir="${stage_root}/${pkg_name}"
          mkdir -p "${stage_dir}/contrib"

          for bin in warden warden-gated warden-tui; do
            cp "${bin_dir}/${bin}" "${stage_dir}/"
            chmod +x "${stage_dir}/${bin}"
          done

          cp -R crates/warden-gated/contrib/systemd "${stage_dir}/contrib/"
          cp -R crates/warden-gated/contrib/launchd "${stage_dir}/contrib/"
          cp README.md "${stage_dir}/"
          if [ -f LICENSE ]; then
            cp LICENSE "${stage_dir}/"
          fi

          tar -C "${stage_root}" -czf "${pkg_name}.tar.gz" "${pkg_name}"
          shasum -a 256 "${pkg_name}.tar.gz" > "${pkg_name}.tar.gz.sha256"

          echo "pkg_name=${pkg_name}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.pkg_name }}
          path: |
            ${{ steps.package.outputs.pkg_name }}.tar.gz
            ${{ steps.package.outputs.pkg_name }}.tar.gz.sha256
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all target artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Flatten artifacts and aggregate checksums
        working-directory: dist
        run: |
          set -euo pipefail
          mkdir -p ../release
          find . -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) -exec cp {} ../release/ \;
          cd ../release
          cat ./*.tar.gz.sha256 > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            release/*.tar.gz release/checksums.txt \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
