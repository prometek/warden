name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  # crates/*/.sqlx caches are committed — no live database needed to build/test.
  SQLX_OFFLINE: "true"

jobs:
  test:
    name: fmt, clippy, build, test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy -D warnings
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo build --release
        run: cargo build --release --workspace

      - name: cargo test
        run: cargo test --workspace

  cargo-deny:
    name: cargo-deny (licenses, advisories, bans, sources)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Reads deny.toml at the repo root (issue #69) — licenses, RustSec
      # advisories, banned/duplicate deps, allowed dependency sources.
      - name: cargo deny check
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  gitleaks:
    name: gitleaks (scan PR diff)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout (full history for diff range)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          set -euo pipefail
          version="8.30.1"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      # Scans only the commits introduced by this PR (base..head), same
      # config as the local pre-commit hook (.gitleaks.toml) — issue #69.
      - name: gitleaks detect (PR diff)
        run: |
          gitleaks detect \
            --source . \
            --config .gitleaks.toml \
            --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --redact \
            --verbose
